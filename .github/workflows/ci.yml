name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
      - name: Download Go modules
        run: go mod download
      - name: Run Go tests
        run: go test ./...
      - name: Run Go race tests
        run: go test ./... -race
      - name: Build loadtest tool
        run: go build ./cmd/loadtest
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - name: Install frontend deps
        run: bun install --frozen-lockfile
      - name: Typecheck frontend
        run: bunx tsc --noEmit
      - name: Build frontend
        run: bunx vite build --config vite.config.ts
      - name: Audit frontend deps
        run: bun audit

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f Dockerfile.backend -t lsm-backend:test .
      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t lsm-frontend:test ./frontend
      - name: Validate compose config
        run: docker compose config
